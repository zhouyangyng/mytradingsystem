name: Deploy Index Environment

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    # A-share opening refresh, China time 09:25-10:00, every 5 minutes.
    - cron: "25-55/5 1 * * 1-5"
    - cron: "0 2 * * 1-5"
    # A-share regular morning refresh, China time 10:10-11:30, every 10 minutes.
    - cron: "10-50/10 2 * * 1-5"
    - cron: "0-30/10 3 * * 1-5"
    # A-share regular afternoon refresh, China time 13:00-14:30, every 10 minutes.
    - cron: "*/10 5 * * 1-5"
    - cron: "0-30/10 6 * * 1-5"
    # A-share closing refresh, China time 14:30-15:10, every 5 minutes.
    - cron: "30-55/5 6 * * 1-5"
    - cron: "0-10/5 7 * * 1-5"
    # Post-close compensation refreshes, China time 15:30 and 18:10.
    - cron: "30 7 * * 1-5"
    - cron: "10 10 * * 1-5"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Shanghai
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Preserve committed report
        run: cp -R outputs outputs.committed

      - name: Build report
        run: python3 work/index-env/market_env.py all

      - name: Keep newest report
        run: |
          python3 - <<'PY'
          import re
          import shutil
          from pathlib import Path

          def report_date(path: str) -> str:
              text = Path(path).read_text(encoding="utf-8")
              patterns = [
                  r'<div class="metric"><span>日期</span><b>(\d{4}-\d{2}-\d{2})',
                  r"数据更新\s+(\d{4}-\d{2}-\d{2})",
              ]
              for pattern in patterns:
                  match = re.search(pattern, text)
                  if match:
                      return match.group(1)
              return "0000-00-00"

          built = report_date("outputs/index.html")
          committed = report_date("outputs.committed/index.html")
          print(f"built report date: {built}")
          print(f"committed report date: {committed}")
          if built < committed:
              print("Built report is older than committed report; keeping committed outputs.")
              shutil.rmtree("outputs")
              shutil.copytree("outputs.committed", "outputs")
          PY

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: outputs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
