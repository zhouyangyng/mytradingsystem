name: Deploy Index Environment

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    # A-share intraday refresh, China time 09:30-11:30.
    - cron: "30-59/10 1 * * 1-5"
    - cron: "*/10 2 * * 1-5"
    - cron: "0-30/10 3 * * 1-5"
    # A-share intraday refresh, China time 13:00-15:10.
    - cron: "*/10 5-6 * * 1-5"
    - cron: "0-10/10 7 * * 1-5"
    # 18:10 China time, after A-share close and data refresh.
    - cron: "10 10 * * 1-5"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Shanghai
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build report
        run: python3 work/index-env/market_env.py all

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: outputs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
